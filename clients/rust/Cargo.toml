[package]
name = "lucid-client"
version = "0.1.0"
edition = "2021"
publish = false
description = "Auto-generated Rust client for the Lucid program"

[features]
anchor = ["dep:anchor-lang"]
anchor-idl-build = ["anchor", "anchor-lang?/idl-build"]
fetch = ["dep:solana-client"]

[dependencies]
borsh = { version = "1.5", features = ["derive"] }
solana-account = "^3.0"
solana-account-info = "^3.0"
solana-cpi = "^3.0"
solana-instruction = "^3.0"
solana-program-error = "^3.0"

[dependencies.solana-address]
version = "^2.6"
features = ["borsh", "copy", "curve25519", "decode"]

[dependencies.solana-client]
optional = true
version = "^3.0"

[dependencies.anchor-lang]
optional = true
version = "~0.31"
