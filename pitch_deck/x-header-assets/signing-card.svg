<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="560" height="325" viewBox="0 0 560 325" fill="none" text-rendering="geometricPrecision" shape-rendering="geometricPrecision">
  <!-- Lucid signing card — Ledger clear-signing display mock.
       Editable in Figma / Illustrator. Fonts: Inter (display), JetBrains Mono (body).
       Replace with system fonts if needed; spec is in ../brief.md -->

  <!-- Card background -->
  <rect x="0" y="0" width="560" height="325" rx="18" ry="18" fill="#1E1E1E"/>
  <!-- Border -->
  <rect x="0.5" y="0.5" width="559" height="324" rx="17.5" ry="17.5" fill="none" stroke="#10B981" stroke-opacity="0.35" stroke-width="1"/>

  <!-- Ledger badge (top-right) -->
  <g transform="translate(342, 16)">
    <rect x="0" y="0" width="188" height="30" rx="7" ry="7" fill="#141414" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1"/>
    <text x="94" y="20" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600"
          letter-spacing="1.4" fill="#A3A3A3" text-anchor="middle">LEDGER · DISPLAY</text>
  </g>

  <!-- Status dot -->
  <circle cx="50" cy="36" r="7" fill="#10B981"/>

  <!-- "APPROVE" label -->
  <text x="70" y="42" font-family="JetBrains Mono, monospace" font-size="16" font-weight="600"
        letter-spacing="1.6" fill="#10B981">APPROVE</text>

  <!-- Main approval line 1 -->
  <text x="50" y="98" xml:space="preserve" font-family="JetBrains Mono, monospace" font-size="26" font-weight="500" fill="#F0F0F0"><tspan fill="#10B981" font-weight="600">withdraw</tspan><tspan> 50000 USDC</tspan></text>
  <!-- Main approval line 2 -->
  <text x="50" y="134" xml:space="preserve" font-family="JetBrains Mono, monospace" font-size="26" font-weight="500" fill="#F0F0F0"><tspan>to </tspan><tspan fill="#A3A3A3">9abcD3…sH4def</tspan></text>

  <!-- Divider -->
  <line x1="50" y1="164" x2="510" y2="164" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Meta block -->
  <g font-family="JetBrains Mono, monospace" font-size="17" letter-spacing="0.3">
    <text x="50" y="200" fill="#737373" font-weight="500">wallet</text>
    <text x="152" y="200" fill="#A3A3A3" font-weight="500">dao-governance · 7Hk2vN…P9zU2A</text>

    <text x="50" y="232" fill="#737373" font-weight="500">proposal</text>
    <text x="152" y="232" fill="#A3A3A3" font-weight="500">#42</text>

    <text x="50" y="264" fill="#737373" font-weight="500">expires</text>
    <text x="152" y="264" fill="#A3A3A3" font-weight="500">09 May 2026 12:00:00 UTC</text>
  </g>

  <!-- Footer hint -->
  <text x="50" y="302" font-family="JetBrains Mono, monospace" font-size="13" font-weight="500"
        letter-spacing="1.3" fill="#525252">SIGNED BODY · ED25519 · ON-CHAIN VERIFIED</text>
</svg>
